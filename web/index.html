<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --link-color: var(--tg-theme-link-color, #0088cc);
            --button-color: var(--tg-theme-button-color, #3390fa);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .products-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-card {
            background-color: var(--secondary-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .product-info h3 {
            margin: 0 0 4px 0;
            font-size: 18px;
        }

        .product-info p {
            margin: 0;
            color: var(--hint-color);
            font-size: 14px;
        }

        .add-button {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-button:active {
            opacity: 0.7;
        }

        .checkout-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            border-top: 1px solid var(--secondary-bg);
        }

        .checkout-button {
            width: 100%;
            max-width: 400px;
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .cart-count {
            font-size: 12px;
            background: var(--link-color);
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <h1>Digital Store</h1>

    <div class="products-container">
        <!-- Product 1 -->
        <div class="product-card" data-id="vpn_premium" data-name="Premium VPN" data-price="15.00">
            <div class="product-info">
                <h3>Premium VPN</h3>
                <p>$15.00</p>
            </div>
            <button class="add-button">Add</button>
        </div>

        <!-- Product 2 -->
        <div class="product-card" data-id="game_key" data-name="Game Key" data-price="29.99">
            <div class="product-info">
                <h3>Game Key</h3>
                <p>$29.99</p>
            </div>
            <button class="add-button">Add</button>
        </div>

        <!-- Product 3 -->
        <div class="product-card" data-id="crypto_course" data-name="Crypto Course" data-price="49.00">
            <div class="product-info">
                <h3>Crypto Course</h3>
                <p>$49.00</p>
            </div>
            <button class="add-button">Add</button>
        </div>
    </div>

    <div style="height: 100px;"></div> <!-- Spacer for fixed bottom button -->

    <div class="checkout-container">
        <button class="checkout-button" id="checkout-btn">
            Checkout <span id="cart-total-count" class="cart-count">0</span>
        </button>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expand to full height

        let cart = [];

        // DOM Elements
        const addButtons = document.querySelectorAll('.add-button');
        const checkoutBtn = document.getElementById('checkout-btn');
        const cartCountDisplay = document.getElementById('cart-total-count');

        // Function to update UI
        function updateCartUI() {
            cartCountDisplay.textContent = cart.length;
        }

        // Event Listeners for Add buttons
        addButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                const card = e.target.closest('.product-card');
                const product = {
                    id: card.dataset.id,
                    name: card.dataset.name,
                    price: parseFloat(card.dataset.price)
                };

                cart.push(product);
                updateCartUI();

                // Haptic feedback (if supported)
                tg.HapticFeedback.impactOccurred('light');
            });
        });

        // Checkout logic
        checkoutBtn.addEventListener('click', () => {
            if (cart.length === 0) {
                tg.showAlert("Your cart is empty!");
                return;
            }

            // Send data to bot
            tg.sendData(JSON.stringify({
                items: cart,
                total_items: cart.length,
                timestamp: Date.now()
            }));
        });

        // Inform Telegram that the app is ready
        tg.ready();
    </script>
</body>
</html>
